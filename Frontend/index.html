<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal | Muhammadaziz</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="icon" type="image/png" href="./assets/logo/my-logo-2.jpg">
  </head>
  <body>
    <div class="container">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <p class="welcome-text" style="margin: 0;">Xush kelibsiz, <span id="userNameDisplay">Muhammadaziz</span></p>
        <button onclick="logout()" class="icon-btn delete" style="padding: 8px 15px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
          <i class="fa-solid fa-right-from-bracket"></i> Chiqish
        </button>
      </div>

      <header class="main-header">
        <h1>Trading Journal</h1>
      </header>

      <div class="dashboard">
        <div class="card">
          <i class="fa-solid fa-layer-group"></i> Total:
          <span id="totalTrades">0</span>
        </div>
        <div class="card win">
          <i class="fa-solid fa-chart-line"></i> Wins: <span id="wins">0</span>
        </div>
        <div class="card loss">
          <i class="fa-solid fa-arrow-trend-down"></i> Losses:
          <span id="losses">0</span>
        </div>
        <div class="card rate">
          <i class="fa-solid fa-percentage"></i> Winrate:
          <span id="winrate">0</span>%
        </div>
        <div class="card profit">
          <i class="fa-solid fa-wallet"></i> Profit:
          <span id="totalProfit">0</span> USD
        </div>
        <div class="card rr">
          <i class="fa-solid fa-scale-balanced"></i> Avg RR:
          <span id="avgRR">0</span>
        </div>
      </div>

      <form id="tradeForm" class="form">
        <div class="grid">
          <div class="field">
            <label><i class="fa-regular fa-calendar"></i> Sana</label>
            <input type="date" name="sana" required />
          </div>
          <div class="field">
            <label><i class="fa-regular fa-clock"></i> Vaqt</label>
            <input type="time" name="vaqt" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-coins"></i> Aktiv</label>
            <input type="text" name="aktiv" placeholder="Masalan: XAUUSD" required />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-wand-magic-sparkles"></i> Strategiya</label>
            <input type="text" name="strategiya" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-arrow-trend-up"></i> Trend</label>
            <input type="text" name="trend" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-vault"></i> Balans</label>
            <input type="number" step="any" name="balans" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-right-to-bracket"></i> Kirish</label>
            <input type="number" step="any" name="kirish" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-shield-halved"></i> SL</label>
            <input type="number" step="any" name="sl" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-bullseye"></i> TP</label>
            <input type="number" step="any" name="tp" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-scale-unbalanced"></i> RR (Avto)</label>
            <input type="text" name="rr" placeholder="1:2" readonly />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-weight-hanging"></i> Lot</label>
            <input type="number" step="any" name="lot" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-flag-checkered"></i> Natija</label>
            <select name="natija">
              <option value="win">Win</option>
              <option value="loss">Loss</option>
            </select>
          </div>
          <div class="field">
            <label><i class="fa-solid fa-dollar-sign"></i> Foyda</label>
            <input type="number" step="any" name="foyda" required />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-triangle-exclamation"></i> Risk %</label>
            <input type="number" step="any" name="risk" />
          </div>
          <div class="field">
            <label><i class="fa-solid fa-hourglass-half"></i> Davomiyligi</label>
            <input type="text" name="davom" />
          </div>

          <div class="field full">
            <label><i class="fa-solid fa-comment-dots"></i> Kirish sababi</label>
            <textarea name="sabab"></textarea>
          </div>

          <div class="field full">
            <label><i class="fa-solid fa-brain"></i> Hissiyotlar (Oldin / Jarayon / Yakun)</label>
            <div class="textarea-group">
              <textarea name="oldHiss" placeholder="Oldin..."></textarea>
              <textarea name="jarayonHiss" placeholder="Jarayon..."></textarea>
              <textarea name="yakunHiss" placeholder="Yakun..."></textarea>
            </div>
          </div>

          <div class="field full">
            <label><i class="fa-solid fa-circle-xmark"></i> Xatolar va To'g'ri ishlar</label>
            <div class="textarea-group">
              <textarea name="xato" placeholder="Xatolar..."></textarea>
              <textarea name="togri" placeholder="To'g'ri ishlar..."></textarea>
            </div>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          Saqlash <i class="fa-solid fa-floppy-disk"></i>
        </button>
      </form>

      <hr style="border: 0; border-top: 1px solid var(--border); margin: 40px 0;" />

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Pair nomi (XAUUSD) yoki natija (Win/Loss) bo'yicha qidirish..." />
      </div>

      <div id="loader">
        <i class="fa-solid fa-spinner fa-spin"></i> Ma'lumotlar yuklanmoqda...
      </div>

      <div id="tradesList" class="trades-container"></div>
    </div>

    <script src="./js/app.js"></script>
    <script>
      // Kirgan foydalanuvchi ismini ko'rsatish
      const userEmail = localStorage.getItem('userEmail');
      if (userEmail) {
          document.getElementById('userNameDisplay').textContent = userEmail.split('@')[0];
      }

      // Logout funksiyasi
      function logout() {
          localStorage.removeItem('token');
          localStorage.removeItem('userEmail');
          window.location.href = 'login.html';
      }
    </script>
  </body>
</html>
