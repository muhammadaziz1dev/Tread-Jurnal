<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div class="container">
      <h1>Assalomu alaykum</h1>
      <h2>Hush kelibsiz Muhammadaziz</h2>
      <h2>Savdolar qanday bo'ldi? Shepim???</h2>

      <form class="form">
        <div class="grid">
          <div class="field">
            <label>Sana</label>
            <input type="date" />
          </div>

          <div class="field">
            <label>Vaqt</label>
            <input type="time" />
          </div>
          <div class="field">
            <label>Aktiv</label>
            <input type="text" placeholder="Masalan: EUR/USD" />
          </div>

          <div class="field">
            <label>Strategiya</label>
            <input type="text" />
          </div>

          <div class="field">
            <label>Trend yo‘nalishi</label>
            <input type="text" />
          </div>

          <div class="field full">
            <label>Kirish sababi</label>
            <textarea></textarea>
          </div>

          <div class="field">
            <label>Hisob balansi</label>
            <input type="number" />
          </div>

          <div class="field">
            <label>Kirish narxi</label>
            <input type="number" />
          </div>

          <div class="field">
            <label>SL</label>
            <input type="number" />
          </div>
          <div class="field">
            <label>TP</label>
            <input type="number" />
          </div>

          <div class="field">
            <label>Xavf/Foyda nisbati</label>
            <input type="text" />
          </div>

          <div class="field">
            <label>Lot hajmi</label>
            <input type="number" />
          </div>

          <div class="field">
            <label>Natija</label>
            <input type="text" placeholder="Win / Loss" />
          </div>

          <div class="field">
            <label>Foyda/Ziyon</label>
            <input type="number" />
          </div>

          <div class="field">
            <label>Davomiyligi</label>
            <input type="text" />
          </div>

          <div class="field full">
            <label>Oldingi hissiyot</label>
            <textarea></textarea>
          </div>

          <div class="field full">
            <label>Jarayon paytidagi hissiyot</label>
            <textarea></textarea>
          </div>
          <div class="field full">
            <label>Yakuniy hissiyot</label>
            <textarea></textarea>
          </div>

          <div class="field full">
            <label>Xatolar</label>
            <textarea></textarea>
          </div>

          <div class="field full">
            <label>To‘g‘ri qilingan ishlar</label>
            <textarea></textarea>
          </div>
        </div>

        <button type="submit">Saqlash</button>
      </form>
    </div>


    <script src="/js/app.js"></script>
  </body>
</html>
